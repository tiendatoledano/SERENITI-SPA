<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            height:45rem;
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;
        }
        .header{
            padding:1.5rem 1.75rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:70px;height:70px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
            transition:all .3s; margin-bottom:0.5rem;
            overflow:hidden;
        }
        .avatar img{width:100%;height:100%;object-fit:cover;}
        .avatar i{font-size:2.5rem;color:white;}
        .title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);}
        .subtitle{font-size:.7rem;color:var(--text-muted);margin-top:.25rem;}
        .status{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:40px;background:rgba(255,255,255,.05);font-size:.7rem;color:var(--text);margin-top:.5rem;}
        .dot{width:7px;height:7px;border-radius:50%;}
        .dot.online{background:#6DB98C;animation:blink 1s infinite alternate;}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate;}
        .dot.listening{background:#e74c3c;animation:pulse 0.5s infinite alternate;}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.3)}}
        
        .conversation{
            flex:1;overflow-y:auto;padding:1rem;
            display:flex;flex-direction:column;gap:.9rem;
        }
        .message{display:flex;gap:.6rem;align-items:flex-end}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:white;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{
            max-width:80%;padding:.65rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
            word-wrap:break-word;
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        
        .rating-container{display:flex;gap:0.5rem;justify-content:center;margin-top:0.5rem;}
        .star-btn{background:none;border:none;font-size:2.5rem;color:var(--text-muted);cursor:pointer;transition:color 0.2s, transform 0.2s;}
        .star-btn.active{color:var(--gold);}
        .star-btn:hover{transform:scale(1.2);}
        .btn-confirm-stars{
            display:block;
            margin:0.8rem auto 0;
            padding:0.4rem 1.5rem;
            border-radius:40px;
            border:1px solid var(--gold);
            background:var(--gold);
            color:#1A160A;
            cursor:pointer;
            font-weight:600;
            font-size:.85rem;
            transition:all .2s;
            font-family:inherit;
        }
        .btn-confirm-stars:hover{background:var(--gold-light);transform:scale(1.05);}
        
        .controls{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
        .btn-back{padding:.5rem 1rem;border-radius:40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);text-decoration:none;font-size:.8rem;transition:all .2s;}
        .btn-back:hover{background:rgba(255,255,255,.12)}
        
        .input-area{display:flex;gap:.5rem;flex:1;margin:0 0.5rem;}
        .input-area input{flex:1;padding:.6rem .8rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none;}
        .input-area input:focus{border-color:var(--gold);}
        .input-area button{padding:.6rem 1rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-size:.8rem;}
        
        .btn-mode{
            padding:.5rem .8rem;
            border-radius:40px;
            border:1px solid var(--border);
            background:transparent;
            color:var(--text-muted);
            cursor:pointer;
            transition:all .2s;
            font-size:.8rem;
            font-family:inherit;
        }
        .btn-mode.active{
            border-color:var(--gold);
            color:var(--gold);
            background:var(--gold-dim);
        }
        .btn-mode:hover{color:var(--text);border-color:var(--text-muted);}
        
        .btn-option{
            padding:.5rem 1.2rem;
            border-radius:40px;
            border:1px solid var(--gold-line);
            background:transparent;
            color:var(--text);
            cursor:pointer;
            transition:all .2s;
            font-family:inherit;
            font-size:.85rem;
            margin-top:.5rem;
            display:inline-block;
        }
        .btn-option:hover{
            background:var(--gold-dim);
            border-color:var(--gold);
            color:var(--gold-light);
        }
        
        .upload-area{
            border:2px dashed var(--gold-line);
            border-radius:12px;
            padding:1rem;
            text-align:center;
            cursor:pointer;
            transition:all .2s;
            margin-top:.5rem;
        }
        .upload-area:hover{border-color:var(--gold);background:var(--gold-dim);}
        .upload-area i{font-size:1.5rem;color:var(--gold);margin-bottom:.3rem;}
        .upload-area p{font-size:.75rem;color:var(--text-muted);}
        
        @media(max-width:520px){
            .card{border-radius:24px}
            .controls{padding:0.8rem 1rem;flex-wrap:wrap;}
            .input-area{margin:0 0.5rem;}
            .btn-mode{font-size:.7rem;padding:.4rem .6rem;}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <i class="fas fa-robot"></i>
        </div>
        <h1 class="title" id="asistenteNombre">Asistente Serenity</h1>
        <p class="subtitle">Tu asistente personal de bienestar</p>
        <div class="status">
            <span class="dot online" id="statusDot"></span>
            <span id="statusText">Conectado</span>
        </div>
    </header>
    
    <section class="conversation" id="conversation">
        <!-- Mensajes -->
    </section>
    
    <div class="controls">
        <a href="/" class="btn-back">← Volver</a>
        
        <div class="input-area">
            <input type="text" id="textInput" placeholder="Escribe o habla..." />
            <button id="btnSendText"><i class="fas fa-paper-plane"></i></button>
        </div>
        
        <button class="btn-mode" id="btnMic" title="Modo voz">
            <i class="fas fa-microphone"></i>
        </button>
    </div>
</main>

<script>
    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    const conversation = document.getElementById('conversation');
    const textInput = document.getElementById('textInput');
    const btnSend = document.getElementById('btnSendText');
    const btnMic = document.getElementById('btnMic');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const avatarEl = document.getElementById('avatarEl');
    
    // Obtener datos del usuario
    const nombreUsuario = sessionStorage.getItem('userNombre') || 'Usuario';
    const nombreWeb = 'Serenity Spa';
    const nombreAsistente = 'Asistente Serenity';
    
    // Estado de la conversación
    let estadoConversacion = 'inicio';
    let calificacionSeleccionada = 0;
    let comentarioUsuario = '';
    let testimonioPublico = false;
    let imagenUsuario = null;
    let modoVoz = false;
    let reconocimiento = null;
    
    // Imagen del bot (logo de la web)
    const IMAGEN_BOT = 'https://i.postimg.cc/hz1zW7dg/1781383382370.webp';
    
    // Mostrar el nombre del asistente
    document.getElementById('asistenteNombre').textContent = nombreAsistente;
    
    // Cargar imagen del bot
    avatarEl.innerHTML = `<img src="${IMAGEN_BOT}" alt="Serenity Spa" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-robot\\'></i>'">`;

    // ============================================================
    // FUNCIONES DE MENSAJES
    // ============================================================
    function agregarMensaje(remitente, texto, esHTML = false) {
        const div = document.createElement('div');
        div.className = `message ${remitente}`;
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        if (remitente === 'bot') {
            pip.innerHTML = '<img src="' + IMAGEN_BOT + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<i class=\\'fas fa-robot\\'></i>\'">';
        } else {
            pip.textContent = nombreUsuario.charAt(0).toUpperCase();
        }
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (esHTML) {
            bubble.innerHTML = texto;
        } else {
            bubble.textContent = texto;
        }
        
        div.appendChild(pip);
        div.appendChild(bubble);
        conversation.appendChild(div);
        conversation.scrollTop = conversation.scrollHeight;
        
        // Si el modo voz está activo y el remitente es el bot, leer el mensaje en voz alta
        if (modoVoz && remitente === 'bot') {
            leerTexto(texto);
        }
    }
    
    function mostrarEstadoPensando() {
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }
    
    function mostrarEstadoConectado() {
        statusDot.className = 'dot online';
        statusText.textContent = 'Conectado';
    }
    
    function mostrarEstadoEscuchando() {
        statusDot.className = 'dot listening';
        statusText.textContent = 'Escuchando...';
    }

    // ============================================================
    // SISTEMA DE AUDIO
    // ============================================================
    function leerTexto(texto) {
        if (!('speechSynthesis' in window)) {
            console.warn('La síntesis de voz no está disponible en este navegador.');
            return;
        }
        
        // Cancelar cualquier síntesis en curso
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        
        // Seleccionar una voz en español si es posible
        const voces = window.speechSynthesis.getVoices();
        const vozEspañol = voces.find(v => v.lang.includes('es'));
        if (vozEspañol) {
            utterance.voice = vozEspañol;
        }
        
        window.speechSynthesis.speak(utterance);
    }
    
    function iniciarReconocimientoVoz() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('El reconocimiento de voz no está disponible en este navegador. Usa Chrome o Edge.');
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        reconocimiento = new SpeechRecognition();
        reconocimiento.lang = 'es-ES';
        reconocimiento.continuous = false;
        reconocimiento.interimResults = false;
        
        reconocimiento.onstart = function() {
            mostrarEstadoEscuchando();
            btnMic.classList.add('active');
        };
        
        reconocimiento.onresult = function(event) {
            const texto = event.results[0][0].transcript;
            textInput.value = texto;
            enviarMensaje();
            mostrarEstadoConectado();
            btnMic.classList.remove('active');
        };
        
        reconocimiento.onerror = function(event) {
            console.warn('Error en reconocimiento de voz:', event.error);
            mostrarEstadoConectado();
            btnMic.classList.remove('active');
            if (event.error === 'not-allowed') {
                alert('Por favor, permite el acceso al micrófono para usar el modo voz.');
            }
        };
        
        reconocimiento.onend = function() {
            mostrarEstadoConectado();
            btnMic.classList.remove('active');
        };
        
        reconocimiento.start();
    }
    
    function toggleModoVoz() {
        modoVoz = !modoVoz;
        if (modoVoz) {
            btnMic.classList.add('active');
            btnMic.title = 'Modo voz activado';
            textInput.placeholder = 'Habla o escribe...';
        } else {
            btnMic.classList.remove('active');
            btnMic.title = 'Activar modo voz';
            textInput.placeholder = 'Escribe o habla...';
            if (reconocimiento) {
                reconocimiento.stop();
            }
        }
    }

    // ============================================================
    // COMPONENTES UI
    // ============================================================
    function mostrarOpcionesEstrellas() {
        const div = document.createElement('div');
        div.className = 'message bot';
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.innerHTML = '<img src="' + IMAGEN_BOT + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<i class=\\'fas fa-robot\\'></i>\'">';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.textAlign = 'center';
        
        const texto = document.createElement('p');
        texto.textContent = '¿Cuántas estrellas nos das? Haz clic en las estrellas y luego confirma.';
        bubble.appendChild(texto);
        
        const container = document.createElement('div');
        container.className = 'rating-container';
        container.id = 'ratingContainer';
        
        for (let i = 1; i <= 5; i++) {
            const btn = document.createElement('button');
            btn.className = 'star-btn';
            btn.dataset.valor = i;
            btn.innerHTML = '<i class="far fa-star"></i>';
            btn.addEventListener('click', () => {
                seleccionarEstrellas(i);
            });
            container.appendChild(btn);
        }
        
        const btnConfirmar = document.createElement('button');
        btnConfirmar.className = 'btn-confirm-stars';
        btnConfirmar.id = 'btnConfirmStars';
        btnConfirmar.textContent = '✅ Enviar calificación';
        btnConfirmar.addEventListener('click', confirmarCalificacion);
        btnConfirmar.style.display = 'none';
        
        bubble.appendChild(container);
        bubble.appendChild(btnConfirmar);
        div.appendChild(pip);
        div.appendChild(bubble);
        conversation.appendChild(div);
        conversation.scrollTop = conversation.scrollHeight;
    }
    
    function seleccionarEstrellas(valor) {
        calificacionSeleccionada = valor;
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((btn, index) => {
            if (index < valor) {
                btn.innerHTML = '<i class="fas fa-star"></i>';
                btn.classList.add('active');
            } else {
                btn.innerHTML = '<i class="far fa-star"></i>';
                btn.classList.remove('active');
            }
        });
        
        // Mostrar el botón de confirmar
        document.getElementById('btnConfirmStars').style.display = 'block';
    }
    
    function confirmarCalificacion() {
        if (calificacionSeleccionada === 0) {
            alert('Por favor, selecciona al menos una estrella.');
            return;
        }
        
        // Ocultar el botón de confirmar
        document.getElementById('btnConfirmStars').style.display = 'none';
        
        // Deshabilitar las estrellas
        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.style.pointerEvents = 'none';
        });
        
        // Enviar el mensaje
        const mensaje = '⭐'.repeat(calificacionSeleccionada);
        agregarMensaje('user', mensaje);
        
        // Responder del bot
        setTimeout(() => {
            mostrarEstadoPensando();
            setTimeout(() => {
                mostrarEstadoConectado();
                const respuesta = `¡Gracias ${nombreUsuario} por valorarnos con ${calificacionSeleccionada} ${calificacionSeleccionada === 1 ? 'estrella' : 'estrellas'}! 🌟\n\n¿Podrías regalarnos un comentario acerca de tu experiencia? Por ejemplo: "Excelente sitio para reservar masajes, lo recomiendo 100%".`;
                agregarMensaje('bot', respuesta);
                estadoConversacion = 'esperando_comentario';
            }, 1000);
        }, 500);
    }
    
    function mostrarOpcionPublicar() {
        const div = document.createElement('div');
        div.className = 'message bot';
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.innerHTML = '<img src="' + IMAGEN_BOT + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<i class=\\'fas fa-robot\\'></i>\'">';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = `
            ¡Gracias ${nombreUsuario}! Tu comentario ha sido guardado exitosamente. 🙌
            <br><br>
            Nos gustaría hacer público tu comentario y tu calificación en nuestra web para que otros usuarios puedan ver tu experiencia.
            <br><br>
            ¿Te gustaría que publiquemos tu testimonio?
            <br><br>
            <button class="btn-option" onclick="responderPublicar(true)">✅ Sí, publícalo</button>
            <button class="btn-option" onclick="responderPublicar(false)">❌ No, gracias</button>
        `;
        
        div.appendChild(pip);
        div.appendChild(bubble);
        conversation.appendChild(div);
        conversation.scrollTop = conversation.scrollHeight;
    }
    
    // Función global para que los botones funcionen
    window.responderPublicar = function(si) {
        if (si) {
            agregarMensaje('user', 'Sí, publícalo');
            testimonioPublico = true;
            setTimeout(() => {
                mostrarEstadoPensando();
                setTimeout(() => {
                    mostrarEstadoConectado();
                    agregarMensaje('bot', '¡Excelente! Para completar tu perfil público, ¿podrías subir una foto de perfil? Esta imagen aparecerá junto a tu nombre y calificación en nuestra página principal.');
                    estadoConversacion = 'esperando_imagen';
                    mostrarOpcionSubirImagen();
                }, 1000);
            }, 500);
        } else {
            agregarMensaje('user', 'No, gracias');
            testimonioPublico = false;
            setTimeout(() => {
                mostrarEstadoPensando();
                setTimeout(() => {
                    mostrarEstadoConectado();
                    agregarMensaje('bot', `Entendido ${nombreUsuario}. Tu comentario quedará guardado en nuestros registros internos. ¡Gracias por tu tiempo y por ser parte de ${nombreWeb}! 🌿\n\nSi necesitas algo más, estoy aquí para ayudarte.`);
                    estadoConversacion = 'inicio';
                }, 1000);
            }, 500);
        }
    };
    
    function mostrarOpcionSubirImagen() {
        const div = document.createElement('div');
        div.className = 'message bot';
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.innerHTML = '<img src="' + IMAGEN_BOT + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<i class=\\'fas fa-robot\\'></i>\'">';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = `
            <p style="margin-bottom:0.5rem;">Sube tu foto de perfil. Esta imagen aparecerá junto a tu nombre y calificación en la página principal.</p>
            <div class="upload-area" onclick="document.getElementById('imagenInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Haz clic para seleccionar tu foto</p>
                <p style="font-size:.6rem;color:var(--text-muted);margin-top:.3rem;">JPG, PNG, WEBP (Máx 2MB)</p>
                <input type="file" id="imagenInput" accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>
            <div id="previewImagen" style="display:none;margin-top:.5rem;text-align:center;">
                <img id="imagenPreview" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);">
                <br>
                <button class="btn-option" onclick="confirmarImagen()" style="margin-top:.5rem;">✅ Confirmar imagen</button>
                <button class="btn-option" onclick="saltarImagen()" style="margin-top:.5rem;border-color:rgba(220,38,38,0.3);color:#f87171;">⏭️ Saltar</button>
            </div>
        `;
        
        div.appendChild(pip);
        div.appendChild(bubble);
        conversation.appendChild(div);
        conversation.scrollTop = conversation.scrollHeight;
        
        // Configurar el evento de carga de imagen
        document.getElementById('imagenInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                alert('La imagen es demasiado grande. Máximo 2MB.');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(ev) {
                imagenUsuario = ev.target.result;
                const preview = document.getElementById('imagenPreview');
                preview.src = imagenUsuario;
                document.getElementById('previewImagen').style.display = 'block';
                document.querySelector('.upload-area p').textContent = 'Imagen seleccionada ✓';
            };
            reader.readAsDataURL(file);
        });
    }
    
    // Funciones globales para manejar la imagen
    window.confirmarImagen = function() {
        if (!imagenUsuario) {
            alert('Por favor, selecciona una imagen primero.');
            return;
        }
        
        agregarMensaje('user', '✅ Imagen confirmada');
        setTimeout(() => {
            mostrarEstadoPensando();
            setTimeout(() => {
                mostrarEstadoConectado();
                // Guardar el testimonio con la imagen
                guardarTestimonio(nombreUsuario, calificacionSeleccionada, comentarioUsuario, imagenUsuario);
                
                agregarMensaje('bot', `¡Perfecto ${nombreUsuario}! Tu testimonio ha sido publicado exitosamente en nuestra web. 🌟\n\nTu experiencia ayudará a muchas personas a confiar en ${nombreWeb}. ¡Gracias por ser parte de nuestra comunidad! 🌿\n\nSi necesitas algo más, estoy aquí para ayudarte.`);
                estadoConversacion = 'inicio';
            }, 1000);
        }, 500);
    };
    
    window.saltarImagen = function() {
        agregarMensaje('user', '⏭️ Saltar imagen');
        setTimeout(() => {
            mostrarEstadoPensando();
            setTimeout(() => {
                mostrarEstadoConectado();
                // Guardar testimonio sin imagen
                guardarTestimonio(nombreUsuario, calificacionSeleccionada, comentarioUsuario, null);
                
                agregarMensaje('bot', `¡Gracias ${nombreUsuario}! Tu testimonio ha sido publicado exitosamente en nuestra web. 🌟\n\nSi en algún momento quieres agregar tu foto de perfil, puedes hacerlo desde tu cuenta.\n\n¡Gracias por ser parte de ${nombreWeb}! 🌿`);
                estadoConversacion = 'inicio';
            }, 1000);
        }, 500);
    };
    
    // ============================================================
    // FUNCIÓN PARA GUARDAR TESTIMONIO
    // ============================================================
    async function guardarTestimonio(nombre, calificacion, comentario, imagen) {
        const testimonio = {
            nombre: nombre,
            calificacion: calificacion,
            comentario: comentario,
            imagen: imagen || null,
            publico: testimonioPublico
        };
        
        try {
            const response = await fetch('/api/testimonios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(testimonio)
            });
            
            if (response.ok) {
                const data = await response.json();
                console.log('✅ Testimonio guardado exitosamente:', data);
            } else {
                const error = await response.json();
                console.error('❌ Error al guardar testimonio:', error);
            }
        } catch (e) {
            console.error('❌ Error de conexión al guardar testimonio:', e);
        }
    }
    
    // ============================================================
    // ENVÍO DE MENSAJES
    // ============================================================
    function enviarMensaje() {
        const texto = textInput.value.trim();
        if (!texto) return;
        
        agregarMensaje('user', texto);
        textInput.value = '';
        
        // Procesar respuesta según el estado
        setTimeout(() => {
            mostrarEstadoPensando();
            setTimeout(() => {
                mostrarEstadoConectado();
                procesarRespuesta(texto);
            }, 800);
        }, 300);
    }
    
    function procesarRespuesta(texto) {
        switch(estadoConversacion) {
            case 'inicio':
                const respuestaInicial = `¡Hola ${nombreUsuario}! 🌿\n\nHe visto que recientemente te has registrado en nuestra plataforma de ${nombreWeb}. Es un gusto, soy tu asistente personal.\n\nNos gustaría saber cómo fue tu experiencia hasta ahora. ¿Podrías calificarnos del 1 al 5 con las estrellas?`;
                agregarMensaje('bot', respuestaInicial);
                estadoConversacion = 'esperando_estrellas';
                mostrarOpcionesEstrellas();
                break;
                
            case 'esperando_comentario':
                comentarioUsuario = texto;
                agregarMensaje('bot', `¡Gracias ${nombreUsuario} por tu comentario! 🙌`);
                setTimeout(() => {
                    mostrarOpcionPublicar();
                }, 500);
                break;
                
            case 'esperando_publicar':
                // Ya manejado por los botones
                break;
                
            case 'esperando_imagen':
                // Ya manejado por la interfaz de subida de imagen
                break;
                
            default:
                agregarMensaje('bot', `Hola ${nombreUsuario}, ¿en qué más puedo ayudarte?`);
        }
    }
    
    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    btnSend.addEventListener('click', enviarMensaje);
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            enviarMensaje();
        }
    });
    
    btnMic.addEventListener('click', () => {
        if (modoVoz) {
            toggleModoVoz();
        } else {
            toggleModoVoz();
            if (modoVoz) {
                iniciarReconocimientoVoz();
            }
        }
    });
    
    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    function init() {
        // Mensaje de bienvenida
        const mensajeBienvenida = `¡Hola ${nombreUsuario}! 🌿\n\nHe visto que te has registrado recientemente en nuestra plataforma de ${nombreWeb}. Es un gusto, soy tu asistente personal.\n\nNos gustaría saber cómo fue tu experiencia hasta ahora. ¿Podrías calificarnos del 1 al 5 con las estrellas?`;
        agregarMensaje('bot', mensajeBienvenida);
        estadoConversacion = 'esperando_estrellas';
        mostrarOpcionesEstrellas();
        
        console.log('🤖 Asistente iniciado para:', nombreUsuario);
        console.log('📝 Modo voz disponible:', 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window);
    }
    
    document.addEventListener('DOMContentLoaded', init);
    
</script>
</body>
</html>
