<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;
        }
        .header{
            padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
            transition:all .3s;
        }
        .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avatarPulse 1.2s ease-in-out infinite}
        @keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        .avatar svg{width:32px;height:32px;color:white}
        .title{
            font-family:'Playfair Display',serif;font-size:1.35rem;
            color:var(--text);margin-top:.75rem;
        }
        .subtitle{
            font-size:.7rem;color:var(--text-muted);margin-top:.25rem;
        }
        .status{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.35rem .9rem;border-radius:40px;
            background:rgba(255,255,255,.05);font-size:.7rem;
            color:var(--text);margin-top:.75rem;
        }
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        
        .conversation{
            height:350px;overflow-y:auto;padding:1.25rem;
            display:flex;flex-direction:column;gap:.9rem;
        }
        .message{display:flex;gap:.6rem;align-items:flex-end}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:white;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{
            max-width:76%;padding:.65rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        .ia-badge{
            display:inline-flex;align-items:center;gap:.3rem;
            background:rgba(201,169,97,.15);color:var(--gold);
            padding:.15rem .5rem;border-radius:10px;font-size:.6rem;
            margin-left:.5rem;
        }
        .controls{
            padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .btn-back{
            padding:.6rem 1.15rem;border-radius:40px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
            color:var(--text);text-decoration:none;font-size:.8rem;
            transition:all .2s;
        }
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{
            width:72px;height:72px;border-radius:50%;
            background:linear-gradient(145deg,#E8C97A,#A8883F);
            border:none;color:white;font-size:1.5rem;cursor:pointer;
            box-shadow:0 8px 32px rgba(201,169,97,.4);
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;
        }
        .btn-mic.recording{
            background:linear-gradient(145deg,#F0A060,#C06030);
            animation:pulse 1.5s infinite;
        }
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        
        .btn-mode{
            padding:.5rem 1rem;border-radius:40px;
            background:transparent;border:1px solid rgba(255,255,255,.15);
            color:var(--text);font-size:.7rem;cursor:pointer;
            transition:all .2s;font-family:inherit;
        }
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}
        
        .codigo-info{
            background:rgba(201,169,97,.1);
            border:1px solid rgba(201,169,97,.2);
            border-radius:12px;
            padding:.75rem;
            margin:.5rem 1rem;
            font-size:.7rem;
            color:var(--gold);
            display:flex;
            align-items:center;
            gap:.5rem;
        }
        .codigo-info i{font-size:.9rem}
        
        @media(max-width:520px){
            .card{border-radius:24px}
            .conversation{height:280px}
            .btn-mic{width:64px;height:64px}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz IA</h1>
        <p class="subtitle">MantenГ© presionado el micrГіfono para hablar</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
            <span class="ia-badge" id="iaBadge" style="display:none">
                <i class="fas fa-robot"></i> IA
            </span>
        </div>
    </header>
    
    <div class="codigo-info" id="codigoInfo" style="display:none">
        <i class="fas fa-key"></i>
        <span>Para cancelar tu reserva, solo necesitas tu cГіdigo de 6 dГӯgitos</span>
    </div>
    
    <section class="conversation" id="conversation"></section>
    
    <footer class="controls">
        <a href="/" class="btn-back">вҶҗ Volver</a>
        
        <button class="btn-mic" id="micBtn" title="MantenГ© presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        
        <button class="btn-mode" id="btnMode" title="Cambiar modo">
            <i class="fas fa-keyboard"></i>
        </button>
    </footer>
    
    <div id="textInputArea" style="display:none;padding:0 1.75rem 1.75rem;border-top:1px solid var(--border)">
        <div style="display:flex;gap:.5rem">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje..." style="flex:1;padding:.75rem 1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none">
            <button id="btnSendText" style="padding:.75rem 1.25rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';
    
    // ============================================================
    // DOM REFS
    // ============================================================
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const iaBadge = document.getElementById('iaBadge');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    const codigoInfo = document.getElementById('codigoInfo');
    
    // ============================================================
    // ESTADO DE RESERVA
    // ============================================================
    let clientName = null;
    let clientPhone = null;
    let clientCountry = '53';
    let selectedMassageType = null;
    let bookingState = null;
    let pendingBooking = {
        nombre: '', dia: '', hora: null, massageType: null,
        telefono: null, codigoPais: '53', ubicacion: null, tipoServicio: 'salon'
    };
    let availableMassages = [];
    let turnosExistentes = [];
    let horariosGlobal = { dias: [], horarios: [] };
    let useIA = false;
    let isSpeaking = false;
    let isThinking = false;
    let isRecording = false;
    let recognition = null;
    let speechQueue = [];
    
    // ============================================================
    // FUNCIONES DE UTILIDAD MEJORADAS
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }
    
    function detectarPaisDesdeTexto(texto) {
        const t = texto.toLowerCase().trim();
        const paises = [
            { nombre: 'Cuba', codigo: '53', claves: ['cuba'] },
            { nombre: 'Argentina', codigo: '54', claves: ['argentina','arg'] },
            { nombre: 'MГ©xico', codigo: '52', claves: ['mГ©xico','mexico','mex'] },
            { nombre: 'Colombia', codigo: '57', claves: ['colombia','colom'] },
            { nombre: 'Chile', codigo: '56', claves: ['chile','chil'] },
            { nombre: 'PerГә', codigo: '51', claves: ['perГә','peru'] },
            { nombre: 'EspaГұa', codigo: '34', claves: ['espaГұa','espania'] },
            { nombre: 'Venezuela', codigo: '58', claves: ['venezuela','vene'] },
            { nombre: 'Ecuador', codigo: '593', claves: ['ecuador','ecua'] },
            { nombre: 'Uruguay', codigo: '598', claves: ['uruguay','uru'] },
            { nombre: 'Paraguay', codigo: '595', claves: ['paraguay','para'] },
            { nombre: 'Bolivia', codigo: '591', claves: ['bolivia','bol'] },
            { nombre: 'Estados Unidos', codigo: '1', claves: ['estados unidos','usa','eeuu'] },
            { nombre: 'Brasil', codigo: '55', claves: ['brasil','brazil'] },
            { nombre: 'Italia', codigo: '39', claves: ['italia','ital'] },
            { nombre: 'Francia', codigo: '33', claves: ['francia','fran'] },
        ];
        for (const pais of paises)
            for (const clave of pais.claves)
                if (t.includes(clave)) return pais;
        return null;
    }
    
    function extraerNombre(texto) {
        const t = texto.toLowerCase().trim();
        const patrones = [
            /(?:me\s+llamo|mi\s+nombre\s+es|soy)\s+([A-ZГҒГүГҚГ“ГҡГ‘][a-zГЎГ©ГӯГіГәГұ]*(?:\s+[A-ZГҒГүГҚГ“ГҡГ‘][a-zГЎГ©ГӯГіГәГұ]*){0,2})/i,
            /(?:hola|buenas?\s*(?:tardes|dГӯas|noches)).*?(?:soy|me\s+llamo|mi\s+nombre\s+es)\s+([A-ZГҒГүГҚГ“ГҡГ‘][a-zГЎГ©ГӯГіГәГұ]*(?:\s+[A-ZГҒГүГҚГ“ГҡГ‘][a-zГЎГ©ГӯГіГәГұ]*){0,2})/i,
            /^([A-ZГҒГүГҚГ“ГҡГ‘][a-zГЎГ©ГӯГіГәГұ]+)(?:\s+(?:quisiera|quiero|reservar|para|un|masaje|turno|por|favor))?$/i,
        ];
        for (const patron of patrones) {
            const match = t.match(patron);
            if (match && match[1]) {
                let nombre = match[1].trim().replace(/[^A-ZГҒГүГҚГ“ГҡГ‘a-zГЎГ©ГӯГіГәГұ]/g, '');
                if (nombre.length >= 2) return nombre;
            }
        }
        const palabras = t.split(/\s+/);
        if (palabras.length === 1 && palabras[0].length >= 2 && /^[a-zГЎГ©ГӯГіГәГұ]{2,15}$/.test(palabras[0]))
            return palabras[0].charAt(0).toUpperCase() + palabras[0].slice(1);
        return null;
    }
    
    function detectarTipoMasaje(texto) {
        const t = texto.toLowerCase().trim();
        for (const servicio of availableMassages) {
            const nombre = servicio.nombre.toLowerCase();
            const palabrasClave = nombre.split(' ');
            let coincide = true;
            for (const palabra of palabrasClave) {
                if (palabra.length > 2 && !t.includes(palabra)) {
                    coincide = false;
                    break;
                }
            }
            if (coincide) return servicio;
            const nombreSinMasaje = nombre.replace('masaje ', '').trim();
            if (t.includes(nombre) || t.includes(nombreSinMasaje)) return servicio;
        }
        return null;
    }
    
    function detectarIntencionReserva(texto) {
        const t = texto.toLowerCase().trim();
        const palabrasReserva = [
            'reservar', 'reserva', 'turno', 'cita', 'agendar', 'agenda',
            'quiero', 'quisiera', 'necesito', 'me gustarГӯa', 'me gustaria',
            'puedo', 'puede', 'disponible', 'horario', 'querГӯa', 'deseo',
            'tomar', 'sacar', 'pedir', 'solicitar'
        ];
        for (const palabra of palabrasReserva) {
            if (t.includes(palabra)) return true;
        }
        return false;
    }
    
    function detectarCodigoEnTexto(texto) {
        const match = texto.match(/\b([A-Z0-9]{6})\b/i);
        if (match) return match[1].toUpperCase();
        return null;
    }
    
    // ============================================================
    // FUNCIONES DE FECHA MEJORADAS
    // ============================================================
    function detectarFechaCompleta(texto) {
        const t = texto.toLowerCase().trim();
        
        const diasMap = {
            'lunes': 'lunes', 'martes': 'martes', 'miercoles': 'miercoles',
            'miГ©rcoles': 'miercoles', 'jueves': 'jueves', 'viernes': 'viernes',
            'sabado': 'sabado', 'sГЎbado': 'sabado', 'domingo': 'domingo'
        };
        
        let diaEncontrado = null;
        for (const [key, value] of Object.entries(diasMap)) {
            if (t.includes(key)) {
                diaEncontrado = value;
                break;
            }
        }
        
        if (t.includes('hoy')) {
            const hoy = new Date();
            const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            diaEncontrado = diasSemana[hoy.getDay()];
        } else if (t.includes('maГұana') || t.includes('maГұana')) {
            const manana = new Date();
            manana.setDate(manana.getDate() + 1);
            const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            diaEncontrado = diasSemana[manana.getDay()];
        }
        
        let horaEncontrada = null;
        const horaRegex = /\b(1[0-9]|2[0-3]|[0-9])\b/;
        const match = t.match(horaRegex);
        if (match) {
            const hora = parseInt(match[1]);
            if (hora >= 0 && hora <= 23) {
                horaEncontrada = hora;
            }
        }
        
        return {
            dia: diaEncontrado,
            hora: horaEncontrada,
            textoCompleto: t
        };
    }
    
    function obtenerSugerenciaFecha(turnos, diaSugerido, horaSugerida) {
        const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
        const hoy = new Date();
        
        // Si no hay dГӯa sugerido, buscar el prГіximo dГӯa disponible
        if (!diaSugerido || !horariosGlobal.dias.includes(diaSugerido)) {
            for (let i = 0; i < 7; i++) {
                const fecha = new Date();
                fecha.setDate(fecha.getDate() + i);
                const diaSemana = diasSemana[fecha.getDay()];
                if (horariosGlobal.dias.includes(diaSemana)) {
                    const horariosLibres = horariosGlobal.horarios.map(h => parseInt(h.split(':')[0]))
                        .filter(h => !turnos.some(t => t.dia === diaSemana && t.hora === h));
                    if (horariosLibres.length > 0) {
                        return {
                            dia: diaSemana,
                            hora: horariosLibres[0],
                            fechaTexto: formatearFecha(fecha)
                        };
                    }
                }
            }
            return null;
        }
        
        // Verificar si hay horarios disponibles para el dГӯa sugerido
        const horariosDisponibles = horariosGlobal.horarios.map(h => parseInt(h.split(':')[0]))
            .filter(h => !turnos.some(t => t.dia === diaSugerido && t.hora === h));
        
        if (horariosDisponibles.length > 0) {
            if (horaSugerida !== null && horariosDisponibles.includes(horaSugerida)) {
                return {
                    dia: diaSugerido,
                    hora: horaSugerida,
                    fechaTexto: `el ${diaSugerido}`
                };
            }
            return {
                dia: diaSugerido,
                hora: horariosDisponibles[0],
                fechaTexto: `el ${diaSugerido}`
            };
        }
        
        // Buscar el prГіximo dГӯa con horarios disponibles
        const idxActual = horariosGlobal.dias.indexOf(diaSugerido);
        for (let i = 1; i <= 7; i++) {
            const idxSiguiente = (idxActual + i) % horariosGlobal.dias.length;
            const diaSiguiente = horariosGlobal.dias[idxSiguiente];
            const horariosLibres = horariosGlobal.horarios.map(h => parseInt(h.split(':')[0]))
                .filter(h => !turnos.some(t => t.dia === diaSiguiente && t.hora === h));
            if (horariosLibres.length > 0) {
                const fecha = new Date();
                fecha.setDate(fecha.getDate() + i);
                return {
                    dia: diaSiguiente,
                    hora: horariosLibres[0],
                    fechaTexto: formatearFecha(fecha)
                };
            }
        }
        
        return null;
    }
    
    function formatearFecha(fecha) {
        if (!fecha) return '';
        const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
        const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        return `${diasSemana[fecha.getDay()]} ${fecha.getDate()} de ${meses[fecha.getMonth()]}`;
    }
    
    function esFechaValida(dia) {
        if (!dia) return false;
        const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
        const hoy = new Date();
        const diaActual = diasSemana[hoy.getDay()];
        const indiceDia = horariosGlobal.dias.indexOf(dia);
        const indiceHoy = horariosGlobal.dias.indexOf(diaActual);
        if (indiceDia === -1) return false;
        if (indiceDia > indiceHoy) return true;
        if (indiceDia === indiceHoy) return true;
        return false;
    }
    
    // ============================================================
    // CARGA DE DATOS INICIALES
    // ============================================================
    async function cargarDatosIniciales() {
        try {
            const [serviciosResp, turnosResp, horariosResp] = await Promise.all([
                fetch('/api/servicios'),
                fetch('/turnos'),
                fetch('/api/config/horarios')
            ]);
            
            if (serviciosResp.ok) {
                availableMassages = await serviciosResp.json();
            }
            if (turnosResp.ok) {
                turnosExistentes = await turnosResp.json();
            }
            if (horariosResp.ok) {
                horariosGlobal = await horariosResp.json();
            }
        } catch(e) {
            console.warn('Error cargando datos:', e);
        }
    }
    
    // ============================================================
    // VOZ NATURAL (Text-to-Speech)
    // ============================================================
    function speakNatural(texto) {
        if (!window.speechSynthesis) return;
        
        let limpio = texto
            .replace(/[\u{1F600}-\u{1F6FF}]/gu, '')
            .replace(/[\u2600-\u26FF]/gu, '')
            .replace(/<[^>]*>/g, '')
            .replace(/\*/g, '')
            .replace(/_/g, '')
            .replace(/[#\[\]()]/g, '')
            .replace(/[^\w\sГЎГ©ГӯГіГәГұГј.,;:!?ВҝВЎ]/gi, '')
            .trim();
        
        if (!limpio) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(limpio);
        utterance.lang = 'es-AR';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = 
            voices.find(v => v.lang === 'es-AR' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-MX' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-ES' && v.name.includes('Google')) ||
            voices.find(v => v.lang.startsWith('es-AR')) ||
            voices.find(v => v.lang.startsWith('es-MX')) ||
            voices.find(v => v.lang.startsWith('es-ES')) ||
            voices.find(v => v.lang.startsWith('es'));
        
        if (bestVoice) utterance.voice = bestVoice;
        
        utterance.onstart = () => {
            isSpeaking = true;
            avatarEl.classList.add('speaking');
            statusDot.className = 'dot speaking';
            statusText.textContent = 'Hablando...';
        };
        
        utterance.onend = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
            if (speechQueue.length > 0) {
                setTimeout(() => speakNatural(speechQueue.shift()), 400);
            }
        };
        
        utterance.onerror = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        };
        
        window.speechSynthesis.speak(utterance);
    }
    
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
    
    // ============================================================
    // MENSAJES
    // ============================================================
    function addMessage(texto, who) {
        let textoLimpio = texto
            .replace(/[\u{1F300}-\u{1F6FF}]/gu, '')
            .replace(/[\u2600-\u26FF]/gu, '')
            .trim();
        if (!textoLimpio) textoLimpio = texto;
        
        const row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? 'T' : 'S';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = textoLimpio;
        
        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;
        
        if (who === 'bot') {
            if (isSpeaking) {
                speechQueue.push(textoLimpio);
            } else {
                speakNatural(textoLimpio);
            }
        }
    }

        isThinking = true;

    function hideThinking() {

    }

    // ============================================================
    // CONFIRMAR RESERVA (API)
    // ============================================================
    async function confirmarReserva() {
        const datos = {
            nombre: pendingBooking.nombre,
            dia: pendingBooking.dia,
            hora: pendingBooking.hora,
            massageType: pendingBooking.massageType,
            telefono: pendingBooking.telefono,
            codigoPais: pendingBooking.codigoPais || '53',
            ubicacion: pendingBooking.ubicacion,
            tipoServicio: pendingBooking.tipoServicio
        };
        
        showThinking();
        
        try {
            const response = await fetch('/turnos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const data = await response.json();
            hideThinking();
            
            if (response.ok) {
                const tipoTexto = datos.tipoServicio === 'domicilio' ? `рҹ“Қ DirecciГіn: ${datos.ubicacion}` : 'рҹ“Қ En nuestro salГіn';
                addMessage(`вң… **TURNO CONFIRMADO**\n\nрҹ“… DГӯa: ${datos.dia}\nвҸ° Hora: ${datos.hora}:00 hs\nрҹ’Ҷ Masaje: ${datos.massageType}\n${tipoTexto}\nрҹ“ұ TelГ©fono: +${datos.codigoPais} ${datos.telefono}\nрҹ”‘ CГіdigo de cancelaciГіn: **${data.codigoCancelacion || 'N/A'}**\n\nTe esperamos en Serenity Spa.`, 'bot');
                bookingState = null;
                pendingBooking = { nombre: clientName, dia: '', hora: null, massageType: null, telefono: clientPhone, codigoPais: datos.codigoPais, ubicacion: null, tipoServicio: 'salon' };
                await cargarDatosIniciales();
            } else {
                if (data.sugerencia) {
                    addMessage(`рҹ“Ң ${data.mensaje || data.error}\n\nВҝTe gustarГӯa reservar para ${data.sugerencia.fechaTexto} a las ${data.sugerencia.hora}:00? (responde "sГӯ" o "no")`, 'bot');
                    bookingState = 'awaiting_suggestion';
                    window._sugerenciaData = data.sugerencia;
                } else if (data.alternativa) {
                    addMessage(`El horario estГЎ ocupado. Tengo disponible ${data.alternativa.dia} a las ${data.alternativa.hora}:00. ВҝTe sirve? (responde "sГӯ" o "no")`, 'bot');
                    bookingState = 'awaiting_alternative';
                    window._alternativaData = data.alternativa;
                } else {
                    addMessage(`Error: ${data.error || 'No se pudo reservar'}`, 'bot');
                }
            }
        } catch (error) {
            hideThinking();
            addMessage('Error de conexiГіn. IntentГЎ nuevamente.', 'bot');
        }
    }
    
    // ============================================================
    // CANCELAR CON CГ“DIGO (API)
    // ============================================================
    async function cancelarConCodigo(codigo) {
        showThinking();
        try {
            const response = await fetch('/api/cancelar-por-codigo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo: codigo.toUpperCase() })
            });
            const data = await response.json();
            hideThinking();
            
            if (data.success) {
                addMessage(data.mensaje, 'bot');
                await cargarDatosIniciales();
            } else {
                addMessage(data.error || 'CГіdigo invГЎlido. Verifica tu cГіdigo de cancelaciГіn.', 'bot');
            }
        } catch(e) {
            hideThinking();
            addMessage('Error al cancelar. IntentГЎ nuevamente.', 'bot');
        }
    }
    
    // ============================================================
    // PROCESAR MENSAJE - LГ“GICA COMPLETA CORREGIDA
    // ============================================================
    async function procesarMensaje(msg) {
        const userMsg = msg.toLowerCase().trim();
        const quiereReservar = detectarIntencionReserva(msg);
        const servicioDetectado = detectarTipoMasaje(msg);
        const fechaDetectada = detectarFechaCompleta(msg);
        
        console.log('рҹ“қ Procesando mensaje:', msg);
        console.log('рҹ“Ҡ DetecciГіn:', { quiereReservar, servicioDetectado, fechaDetectada });
        
        // ============================================================
        // CASO 1: DETECTГ“ SERVICIO + INTENCIГ“N DE RESERVAR
        // ============================================================
        if (servicioDetectado && quiereReservar) {
            selectedMassageType = servicioDetectado.nombre;
            
            if (clientName && clientPhone && clientCountry) {
                pendingBooking = {
                    nombre: clientName, dia: '', hora: null,
                    massageType: selectedMassageType,
                    telefono: clientPhone,
                    codigoPais: clientCountry || '53',
                    ubicacion: null, tipoServicio: 'salon'
                };
                
                // Verificar si el mensaje contiene fecha y hora
                if (fechaDetectada.dia && fechaDetectada.hora !== null) {
                    // Intentar reservar directamente
                    pendingBooking.dia = fechaDetectada.dia;
                    pendingBooking.hora = fechaDetectada.hora;
                    
                    // Verificar si el dГӯa es vГЎlido
                    if (horariosGlobal.dias.includes(fechaDetectada.dia) && esFechaValida(fechaDetectada.dia)) {
                        await confirmarReserva();
                        return;
                    }
                }
                
                bookingState = 'awaiting_service_type';
                addMessage(`вң… Perfecto, has seleccionado **${selectedMassageType}**.\n\nрҹ“Қ ВҝDГіnde prefieres recibir el masaje?\n\n1пёҸвғЈ En el salГіn\n2пёҸвғЈ A domicilio\n\nResponde con el nГәmero 1 o 2.`, 'bot');
                return;
            } else if (clientName && clientCountry) {
                bookingState = 'awaiting_phone_with_massage';
                pendingBooking.massageType = selectedMassageType;
                addMessage(`Has seleccionado **${selectedMassageType}**. Para confirmar la reserva, necesito tu nГәmero de telГ©fono. ВҝCuГЎl es?`, 'bot');
                return;
            } else if (clientName) {
                bookingState = 'awaiting_country_with_massage';
                pendingBooking.massageType = selectedMassageType;
                addMessage(`Has seleccionado **${selectedMassageType}**. ВҝDe quГ© paГӯs eres? (Ejemplo: Cuba, Argentina, MГ©xico...)`, 'bot');
                return;
            } else {
                bookingState = 'awaiting_name_with_massage';
                pendingBooking.massageType = selectedMassageType;
                addMessage(`Has seleccionado **${selectedMassageType}**. Para comenzar, ВҝcuГЎl es tu nombre?`, 'bot');
                return;
            }
        }
        
        // ============================================================
        // CASO 2: DETECTГ“ FECHA COMPLETA + INTENCIГ“N DE RESERVAR
        // ============================================================
        if (quiereReservar && fechaDetectada.dia && fechaDetectada.hora !== null && !servicioDetectado) {
            // El usuario quiere reservar y especificГі fecha y hora
            if (clientName && clientPhone && clientCountry) {
                pendingBooking = {
                    nombre: clientName, dia: fechaDetectada.dia,
                    hora: fechaDetectada.hora,
                    massageType: null,
                    telefono: clientPhone,
                    codigoPais: clientCountry || '53',
                    ubicacion: null, tipoServicio: 'salon'
                };
                bookingState = 'selecting_massage_for_date';
                addMessage(`рҹ“… Has solicitado para ${fechaDetectada.dia} a las ${fechaDetectada.hora}:00.\n\nВҝQuГ© masaje deseas?`, 'bot');
                showMassageMenu();
                return;
            } else if (clientName && clientCountry) {
                bookingState = 'awaiting_phone_with_date';
                pendingBooking.dia = fechaDetectada.dia;
                pendingBooking.hora = fechaDetectada.hora;
                addMessage(`рҹ“… Has solicitado para ${fechaDetectada.dia} a las ${fechaDetectada.hora}:00.\n\nPara confirmar, necesito tu nГәmero de telГ©fono. ВҝCuГЎl es?`, 'bot');
                return;
            } else if (clientName) {
                bookingState = 'awaiting_country_with_date';
                pendingBooking.dia = fechaDetectada.dia;
                pendingBooking.hora = fechaDetectada.hora;
                addMessage(`рҹ“… Has solicitado para ${fechaDetectada.dia} a las ${fechaDetectada.hora}:00.\n\nВҝDe quГ© paГӯs eres?`, 'bot');
                return;
            } else {
                bookingState = 'awaiting_name_with_date';
                pendingBooking.dia = fechaDetectada.dia;
                pendingBooking.hora = fechaDetectada.hora;
                addMessage(`рҹ“… Has solicitado para ${fechaDetectada.dia} a las ${fechaDetectada.hora}:00.\n\nPara comenzar, ВҝcuГЎl es tu nombre?`, 'bot');
                return;
            }
        }
        
        // ============================================================
        // CASO 3: SOLO SERVICIO (sin intenciГіn de reservar)
        // ============================================================
        if (servicioDetectado) {
            const s = servicioDetectado;
            addMessage(`рҹ“Ӣ **${s.nombre}**\nрҹ’° Precio: ${s.precio}\nрҹ“қ ${s.descripcion}\n\nвң… **Beneficios:**\n${(s.beneficios || []).map(b => `  вҖў ${b}`).join('\n')}\n\nВҝTe gustarГӯa reservar este masaje?`, 'bot');
            return;
        }
        
        // ============================================================
        // CASO 4: SI SOLO QUIERE RESERVAR (sin servicio especГӯfico)
        // ============================================================
        if (quiereReservar) {
            iniciarReservaDirect();
            return;
        }
        
        // ============================================================
        // CASO 5: CANCELACIГ“N
        // ============================================================
        const codigo = detectarCodigoEnTexto(msg);
        if (codigo && (userMsg.includes('cancelar') || userMsg.includes('anular') || userMsg.includes('eliminar'))) {
            await cancelarConCodigo(codigo);
            return;
        }
        if (userMsg.includes('cancelar') || userMsg.includes('anular') || userMsg.includes('eliminar')) {
            addMessage('рҹ”‘ Para cancelar tu reserva, necesito tu cГіdigo de 6 dГӯgitos (ejemplo: A3B7X9).\n\nSi no tienes el cГіdigo, revisa el mensaje de confirmaciГіn que te enviamos al reservar.', 'bot');
            return;
        }
        
        // ============================================================
        // CASO 6: ESTADOS DE RESERVA
        // ============================================================
        if (bookingState === 'awaiting_country' || bookingState === 'awaiting_country_with_massage' || bookingState === 'awaiting_country_with_date') {
            const paisDetectado = detectarPaisDesdeTexto(msg);
            if (paisDetectado) {
                clientCountry = paisDetectado.codigo;
                pendingBooking.codigoPais = paisDetectado.codigo;
                addMessage(`${paisDetectado.nombre} (+${paisDetectado.codigo}) registrado. Ahora, ВҝcuГЎl es tu nГәmero de telГ©fono?`, 'bot');
                if (bookingState === 'awaiting_country_with_date') {
                    bookingState = 'awaiting_phone_with_date';
                } else {
                    bookingState = bookingState === 'awaiting_country_with_massage' ? 'awaiting_phone_with_massage' : 'awaiting_phone_simple';
                }
            } else {
                addMessage('No reconocГӯ el paГӯs. Por favor, dilo de nuevo.\nEjemplos: Cuba, Argentina, MГ©xico, EspaГұa...', 'bot');
            }
            return;
        }
        
        if (bookingState === 'awaiting_name_simple' || bookingState === 'awaiting_name_with_massage' || bookingState === 'awaiting_name_with_date') {
            const nombreExtraido = extraerNombre(msg);
            if (nombreExtraido) {
                clientName = nombreExtraido;
            } else if (msg.trim().length >= 2) {
                clientName = msg.trim();
            } else {
                addMessage('Por favor, ingresa tu nombre.', 'bot'); return;
            }
            pendingBooking.nombre = clientName;
            
            if (bookingState === 'awaiting_name_with_date') {
                addMessage(`Gracias ${clientName}. ВҝDe quГ© paГӯs eres?`, 'bot');
                bookingState = 'awaiting_country_with_date';
            } else if (bookingState === 'awaiting_name_with_massage') {
                addMessage(`Gracias ${clientName}. ВҝDe quГ© paГӯs eres?`, 'bot');
                bookingState = 'awaiting_country_with_massage';
            } else {
                addMessage(`Gracias ${clientName}. ВҝDe quГ© paГӯs eres?`, 'bot');
                bookingState = 'awaiting_country';
            }
            return;
        }
        
        if (bookingState === 'awaiting_phone_simple' || bookingState === 'awaiting_phone_with_massage' || bookingState === 'awaiting_phone_with_date') {
            const telefono = msg.replace(/\D/g, '');
            if (telefono.length >= 7) {
                clientPhone = telefono;
                pendingBooking.telefono = telefono;
                pendingBooking.nombre = clientName;
                pendingBooking.codigoPais = clientCountry || '53';
                
                if (bookingState === 'awaiting_phone_with_date') {
                    bookingState = 'selecting_massage_for_date';
                    addMessage(`вң… TelГ©fono registrado. ВҝQuГ© masaje deseas para ${pendingBooking.dia} a las ${pendingBooking.hora}:00?`, 'bot');
                    showMassageMenu();
                } else if (bookingState === 'awaiting_phone_with_massage') {
                    pendingBooking.massageType = selectedMassageType;
                    bookingState = 'awaiting_service_type';
                    addMessage(`вң… TelГ©fono registrado. ВҝDГіnde prefieres recibir el masaje?\n\n1пёҸвғЈ En el salГіn\n2пёҸвғЈ A domicilio`, 'bot');
                } else {
                    bookingState = 'selecting_massage_simple';
                    showMassageMenu();
                }
            } else {
                addMessage('NГәmero invГЎlido. Ingresa al menos 7 dГӯgitos.', 'bot');
            }
            return;
        }
        
        if (bookingState === 'selecting_massage_simple' || bookingState === 'selecting_massage_for_date') {
            const servicioPorNombre = detectarTipoMasaje(msg);
            if (servicioPorNombre) {
                selectedMassageType = servicioPorNombre.nombre;
                pendingBooking.massageType = selectedMassageType;
                
                if (bookingState === 'selecting_massage_for_date' && pendingBooking.dia && pendingBooking.hora !== null) {
                    await confirmarReserva();
                    return;
                }
                
                bookingState = 'awaiting_service_type';
                addMessage(`Has seleccionado **${selectedMassageType}**. ВҝDГіnde prefieres recibirlo?\n\n1пёҸвғЈ En el salГіn\n2пёҸвғЈ A domicilio`, 'bot');
                return;
            }
            
            const option = parseInt(msg);
            if (!isNaN(option) && option >= 1 && option <= availableMassages.length) {
                selectedMassageType = availableMassages[option - 1].nombre;
                pendingBooking.massageType = selectedMassageType;
                
                if (bookingState === 'selecting_massage_for_date' && pendingBooking.dia && pendingBooking.hora !== null) {
                    await confirmarReserva();
                    return;
                }
                
                bookingState = 'awaiting_service_type';
                addMessage(`Has seleccionado **${selectedMassageType}**. ВҝDГіnde prefieres recibirlo?\n\n1пёҸвғЈ En el salГіn\n2пёҸвғЈ A domicilio`, 'bot');
            } else {
                addMessage('Por favor, selecciona un nГәmero vГЎlido de la lista o escribe el nombre del masaje.', 'bot');
            }
            return;
        }
        
        if (bookingState === 'awaiting_service_type') {
            if (msg === '1') {
                pendingBooking.tipoServicio = 'salon';
                pendingBooking.ubicacion = 'SalГіn Serenity Spa';
                
                // Verificar si ya tenemos dГӯa y hora
                if (pendingBooking.dia && pendingBooking.hora !== null) {
                    await confirmarReserva();
                    return;
                }
                
                bookingState = 'awaiting_day';
                const diasStr = horariosGlobal.dias.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ');
                addMessage(`вң… Servicio en el salГіn.\n\nрҹ“… ВҝQuГ© dГӯa prefieres? (${diasStr})\n\nResponde con el dГӯa de la semana.`, 'bot');
            } else if (msg === '2') {
                pendingBooking.tipoServicio = 'domicilio';
                bookingState = 'awaiting_location';
                addMessage(`рҹҡ— Servicio a domicilio.\n\nрҹ“Қ Por favor, ingresa tu direcciГіn completa:`, 'bot');
            } else {
                addMessage(`Responde "1" para salГіn o "2" para domicilio.`, 'bot');
            }
            return;
        }
        
        if (bookingState === 'awaiting_location') {
            if (msg.trim().length > 5) {
                pendingBooking.ubicacion = msg.trim();
                
                if (pendingBooking.dia && pendingBooking.hora !== null) {
                    await confirmarReserva();
                    return;
                }
                
                bookingState = 'awaiting_day';
                const diasStr = horariosGlobal.dias.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ');
                addMessage(`рҹ“Қ DirecciГіn registrada.\n\nрҹ“… ВҝQuГ© dГӯa prefieres? (${diasStr})`, 'bot');
            } else {
                addMessage('Por favor, ingresa una direcciГіn vГЎlida.', 'bot');
            }
            return;
        }
        
        if (bookingState === 'awaiting_day') {
            const fechaDetectadaDia = detectarFechaCompleta(msg);
            let dia = fechaDetectadaDia.dia;
            let horaSugerida = fechaDetectadaDia.hora;
            
            // Si no se detectГі dГӯa, preguntar nuevamente
            if (!dia) {
                const diasStr = horariosGlobal.dias.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ');
                addMessage(`No reconocГӯ el dГӯa. Por favor, dime el dГӯa de la semana (${diasStr}) o "hoy" o "maГұana".`, 'bot');
                return;
            }
            
            // Verificar si el dГӯa es vГЎlido
            if (!horariosGlobal.dias.includes(dia)) {
                const sugerencia = obtenerSugerenciaFecha(turnosExistentes, dia, horaSugerida);
                if (sugerencia) {
                    addMessage(`El dГӯa ${dia} no estГЎ disponible. Te sugiero ${sugerencia.fechaTexto} a las ${sugerencia.hora}:00 hs. ВҝTe sirve? (responde "sГӯ" o "no")`, 'bot');
                    bookingState = 'awaiting_suggestion';
                    window._sugerenciaData = sugerencia;
                } else {
                    const diasStr = horariosGlobal.dias.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ');
                    addMessage(`DГӯa no vГЎlido. DГӯas disponibles: ${diasStr}. Por favor, elige uno.`, 'bot');
                }
                return;
            }
            
            // Si el dГӯa es vГЎlido pero es hoy y ya pasГі la hora sugerida
            const hoy = new Date();
            const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            const diaActual = diasSemana[hoy.getDay()];
            
            if (dia === diaActual && horaSugerida !== null && horaSugerida < hoy.getHours()) {
                const sugerencia = obtenerSugerenciaFecha(turnosExistentes, dia, null);
                if (sugerencia) {
                    addMessage(`La hora ${horaSugerida}:00 ya pasГі. Te sugiero ${sugerencia.fechaTexto} a las ${sugerencia.hora}:00 hs. ВҝTe sirve?`, 'bot');
                    bookingState = 'awaiting_suggestion';
                    window._sugerenciaData = sugerencia;
                } else {
                    addMessage(`La hora ${horaSugerida}:00 ya pasГі. Por favor, elige otro horario.`, 'bot');
                }
                return;
            }
            
            // Verificar si el dГӯa ya pasГі
            if (!esFechaValida(dia)) {
                const sugerencia = obtenerSugerenciaFecha(turnosExistentes, dia, null);
                if (sugerencia) {
                    addMessage(`El dГӯa ${dia} ya pasГі. Te sugiero ${sugerencia.fechaTexto} a las ${sugerencia.hora}:00 hs. ВҝTe sirve? (responde "sГӯ" o "no")`, 'bot');
                    bookingState = 'awaiting_suggestion';
                    window._sugerenciaData = sugerencia;
                } else {
                    addMessage(`El dГӯa ${dia} ya pasГі. Por favor, elige un dГӯa futuro.`, 'bot');
                }
                return;
            }
            
            // Verificar si hay horarios disponibles para el dГӯa
            const horariosDisponibles = horariosGlobal.horarios.map(h => parseInt(h.split(':')[0]))
                .filter(h => !turnosExistentes.some(t => t.dia === dia && t.hora === h));
            
            if (horariosDisponibles.length === 0) {
                const sugerencia = obtenerSugerenciaFecha(turnosExistentes, dia, null);
                if (sugerencia) {
                    addMessage(`El ${dia} estГЎ completo. Te sugiero ${sugerencia.fechaTexto} a las ${sugerencia.hora}:00 hs. ВҝTe sirve?`, 'bot');
                    bookingState = 'awaiting_suggestion';
                    window._sugerenciaData = sugerencia;
                } else {
                    addMessage(`No hay horarios disponibles para el ${dia}. Por favor, elige otro dГӯa.`, 'bot');
                }
                return;
            }
            
            // Si el usuario sugiriГі una hora y estГЎ disponible, usarla
            if (horaSugerida !== null && horariosDisponibles.includes(horaSugerida)) {
                pendingBooking.dia = dia;
                pendingBooking.hora = horaSugerida;
                await confirmarReserva();
                return;
            }
            
            // Si no, mostrar los horarios disponibles
            pendingBooking.dia = dia;
            bookingState = 'awaiting_time_specific';
            const horariosStr = horariosDisponibles.join(' hs, ');
            addMessage(`вң… DГӯa ${dia} confirmado. Horarios disponibles: ${horariosStr} hs.\n\nВҝA quГ© hora prefieres? (responde con el nГәmero)`, 'bot');
            return;
        }
        
        if (bookingState === 'awaiting_time_specific') {
            let hora = parseInt(msg);
            const horasNumeros = horariosGlobal.horarios.map(h => parseInt(h.split(':')[0]));
            if (!horasNumeros.includes(hora)) {
                addMessage(`Hora no vГЎlida. Horarios: ${horariosGlobal.horarios.join(', ')}.`, 'bot');
                return;
            }
            
            const ocupado = turnosExistentes.some(t => t.dia === pendingBooking.dia && t.hora === hora);
            if (!ocupado) {
                const yaTieneTurno = turnosExistentes.some(t => t.telefono === pendingBooking.telefono && t.dia === pendingBooking.dia);
                if (yaTieneTurno) {
                    addMessage(`Ya tienes un turno reservado para el ${pendingBooking.dia}. Solo se permite un masaje por dГӯa.`, 'bot');
                    bookingState = null;
                    return;
                }
                pendingBooking.hora = hora;
                await confirmarReserva();
            } else {
                const horariosDisponibles = horasNumeros.filter(h => !turnosExistentes.some(t => t.dia === pendingBooking.dia && t.hora === h));
                if (horariosDisponibles.length > 0) {
                    addMessage(`El horario de las ${hora}:00 estГЎ ocupado. Horarios disponibles: ${horariosDisponibles.join(' hs, ')} hs.`, 'bot');
                } else {
                    const sugerencia = obtenerSugerenciaFecha(turnosExistentes, pendingBooking.dia, null);
                    if (sugerencia) {
                        addMessage(`El ${pendingBooking.dia} estГЎ completo. Te sugiero ${sugerencia.fechaTexto} a las ${sugerencia.hora}:00 hs. ВҝTe sirve?`, 'bot');
                        bookingState = 'awaiting_suggestion';
                        window._sugerenciaData = sugerencia;
                    } else {
                        addMessage(`No hay horarios disponibles para el ${pendingBooking.dia}. Por favor, elige otro dГӯa.`, 'bot');
                        bookingState = 'awaiting_day';
                    }
                }
            }
            return;
        }
        
        if (bookingState === 'awaiting_suggestion') {
            if (userMsg.includes('sГӯ') || userMsg.includes('si') || userMsg.includes('ok') || userMsg.includes('vale') || userMsg.includes('perfecto')) {
                const sugerencia = window._sugerenciaData;
                if (sugerencia) {
                    pendingBooking.dia = sugerencia.dia;
                    pendingBooking.hora = sugerencia.hora;
                    await confirmarReserva();
                } else {
                    addMessage('No tengo una sugerencia disponible. Por favor, elige un dГӯa y hora.', 'bot');
                    bookingState = 'awaiting_day';
                }
            } else {
                addMessage('Entendido. ВҝQuГ© dГӯa prefieres entonces?', 'bot');
                bookingState = 'awaiting_day';
            }
            return;
        }
        
        if (bookingState === 'awaiting_alternative') {
            if (userMsg.includes('sГӯ') || userMsg.includes('si') || userMsg.includes('ok') || userMsg.includes('vale')) {
                const alt = window._alternativaData;
                if (alt) {
                    pendingBooking.dia = alt.dia;
                    pendingBooking.hora = alt.hora;
                    await confirmarReserva();
                }
            } else {
                addMessage('Entendido. ВҝQuГ© dГӯa prefieres entonces?', 'bot');
                bookingState = 'awaiting_day';
            }
            return;
        }
        
        // ============================================================
        // CASO 7: PREGUNTAS GENERALES
        // ============================================================
        if (userMsg.includes('horario') || userMsg.includes('horarios') || userMsg.includes('disponible')) {
            addMessage(`вҸ° **Horarios disponibles:**\n${horariosGlobal.horarios.join(' hs\n')} hs\n\nрҹ“… **DГӯas:** ${horariosGlobal.dias.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ')}\n\nвҡ пёҸ Un masaje por persona por dГӯa.`, 'bot');
        } else if (userMsg.includes('masaje') || userMsg.includes('tipos') || userMsg.includes('servicios')) {
            showMassageMenu();
        } else if (userMsg.includes('precio') || userMsg.includes('costo') || userMsg.includes('cuГЎnto') || userMsg.includes('cuanto')) {
            let lista = 'рҹ’° **Precios:**\n\n';
            availableMassages.forEach(m => { lista += `вҖў ${m.nombre}: ${m.precio}\n`; });
            addMessage(lista, 'bot');
        } else if (userMsg.includes('gracias') || userMsg.includes('ok') || userMsg.includes('vale')) {
            addMessage(`рҹҷҸ Gracias a ti, ${clientName || 'cliente'}! Que tengas un excelente dГӯa.\n\nВҝNecesitas algo mГЎs?`, 'bot');
        } else {
            // Intento con IA si estГЎ disponible
            if (useIA) {
                try {
                    const response = await fetch('/api/chat-ia', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            mensaje: msg,
                            nombre: clientName || 'cliente',
                            codigoPais: clientCountry || '53'
                        })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.modo === 'bloqueado') {
                            addMessage(data.respuesta, 'bot');
                            return;
                        }
                        addMessage(data.respuesta, 'bot');
                        return;
                    }
                } catch(e) {
                    console.warn('Error en IA:', e);
                }
            }
            
            const nombre = clientName || 'cliente';
            addMessage(`рҹ‘Ӣ Hola ${nombre}! Puedo ayudarte con:\n\nрҹ“Ң Reservar un turno\nвҸ° Ver horarios disponibles\nрҹ’Ҷ Conocer los tipos de masaje\nрҹ’° Consultar precios\nрҹ”‘ Cancelar una reserva\n\nВҝQuГ© necesitas?`, 'bot');
        }
    }
    
    // ============================================================
    // ENVIAR MENSAJE (desde voz o texto)
    // ============================================================
    function enviarMensaje(texto) {
        if (!texto.trim()) return;
        addMessage(texto, 'user');
        showThinking();
        
        setTimeout(async () => {
            try {
                await procesarMensaje(texto);
            } catch(e) {
                console.error('Error procesando mensaje:', e);
                addMessage('OcurriГі un error al procesar tu mensaje. IntentГЎ de nuevo.', 'bot');
            }
            hideThinking();
        }, 500);
    }
    
    // ============================================================
    // MENSAJE DE BIENVENIDA
    // ============================================================
    function mensajeBienvenida() {
        const bienvenida = useIA 
            ? 'Hola, soy el asistente con inteligencia artificial de Serenity Spa. Decime tu nombre y de quГ© paГӯs sos para comenzar. TambiГ©n podes cancelar tu reserva con tu cГіdigo de 6 dГӯgitos.'
            : 'Hola, sea usted bienvenido a Serenity Spa. Puedo ayudarte a reservar un turno o cancelar una reserva existente con tu cГіdigo de 6 dГӯgitos. ВҝQuГ© necesitas?';
        addMessage(bienvenida, 'bot');
        setTimeout(() => {
            codigoInfo.style.display = 'flex';
            setTimeout(() => {
                codigoInfo.style.opacity = '0';
                setTimeout(() => codigoInfo.style.display = 'none', 500);
            }, 5000);
        }, 1000);
    }
    
    // ============================================================
    // RECONOCIMIENTO DE VOZ
    // ============================================================
    function startRecording() {
        if (isRecording || isSpeaking) return;
        
        if (window.speechSynthesis && isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Este navegador no soporta reconocimiento de voz. UsГЎ el modo texto o Google Chrome.', 'bot');
            return;
        }
        
        try {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = 'Grabando... SoltГЎ para enviar';
            };
            
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                enviarMensaje(texto);
            };
            
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Error reconocimiento:', event.error);
                if (event.error === 'no-speech') {
                    addMessage('No detectГ© ningГәn sonido. IntentГЎ de nuevo.', 'bot');
                } else if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrГіfono denegado. UsГЎ el modo texto.', 'bot');
                }
            };
            
            recognition.start();
        } catch(e) {
            isRecording = false;
            micBtn.classList.remove('recording');
            addMessage('Error al iniciar el micrГіfono. UsГЎ el modo texto.', 'bot');
        }
    }
    
    function stopRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }
    
    // ============================================================
    // MODO TEXTO
    // ============================================================
    function toggleTextMode() {
        const textMode = textInputArea.style.display !== 'block';
        
        if (textMode) {
            textInputArea.style.display = 'block';
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            micBtn.style.display = 'none';
            textInput.focus();
        } else {
            textInputArea.style.display = 'none';
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            micBtn.style.display = 'flex';
        }
    }
    
    // ============================================================
    // INICIALIZACIГ“N
    // ============================================================
    async function init() {
        // Verificar IA
        try {
            const resp = await fetch('/health');
            const data = await resp.json();
            useIA = data.ia === 'conectada';
            if (useIA) {
                iaBadge.style.display = 'inline-flex';
            }
        } catch(e) {}
        
        // Cargar datos
        await cargarDatosIniciales();
        
        // Mostrar bienvenida
        statusDot.className = 'dot';
        statusText.textContent = 'Escuchando...';
        mensajeBienvenida();
        
        // Eventos
        micBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
        micBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopRecording(); });
        micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
        
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
        micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); }, { passive: false });
        
        btnMode.addEventListener('click', toggleTextMode);
        
        btnSendText.addEventListener('click', () => {
            const texto = textInput.value;
            if (texto.trim()) {
                enviarMensaje(texto);
                textInput.value = '';
            }
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const texto = textInput.value;
                if (texto.trim()) {
                    enviarMensaje(texto);
                    textInput.value = '';
                }
            }
        });
        
        // Atajo de teclado
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
                e.preventDefault();
                if (!isRecording) startRecording();
                else stopRecording();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                toggleTextMode();
            }
        });
    }
    
    init();
    
})();
</script>
</body>
</html>
