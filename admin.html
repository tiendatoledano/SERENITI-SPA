    <style>

        .sidebar-menu li a {

        }
    </style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
// ============================================================
// VARIABLES GLOBALES
// ============================================================
const HORARIOS_API = '/api/config/horarios';
let horariosConfig = { dias: [], horarios: [], inicio: 8, fin: 20 };
let seccionActual = 'config';

// ============================================================
// TOAST MEJORADO
// ============================================================
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const msgEl = document.getElementById('toastMsg');
    if (!t || !msgEl) { console.log('📢 Toast:', type, '-', msg); return; }
    msgEl.textContent = msg;
    t.className = 'toast ' + type;
    const icon = t.querySelector('i');
    if (icon) {
        if (type === 'error') icon.className = 'fas fa-exclamation-circle';
        else if (type === 'warning') icon.className = 'fas fa-exclamation-triangle';
        else if (type === 'info') icon.className = 'fas fa-info-circle';
        else icon.className = 'fas fa-check-circle';
    }
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
}

// ============================================================
// TOKEN
// ============================================================
function getToken() { return sessionStorage.getItem('adminToken'); }

function cerrarSesion() {
    sessionStorage.removeItem('adminToken');
    window.location.href = '/login.html';
}

// ============================================================
// VERIFICAR TOKEN
// ============================================================
async function verifyToken() {
    const token = getToken();
    if (!token) return false;
    try {
        const r = await fetch('/api/verify', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await r.json();
        if (!data.valid) { sessionStorage.removeItem('adminToken'); return false; }
        return true;
    } catch { return false; }
}

// ============================================================
// API FETCH
// ============================================================
async function apiFetch(url, opts = {}) {
    const token = getToken();
    if (!token) {
        showToast('⚠️ Sesión expirada', 'error');
        throw new Error('No auth');
    }
    const response = await fetch(url, {
        ...opts,
        headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        }
    });
    if (response.status === 401) {
        sessionStorage.removeItem('adminToken');
        showToast('⚠️ Sesión expirada', 'error');
        throw new Error('Sesión expirada');
    }
    return response;
}

// ============================================================
// MENÚ LATERAL
// ============================================================
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
    document.getElementById('mainContent').classList.toggle('shifted');
}

function cerrarSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.getElementById('mainContent').classList.remove('shifted');
}

document.getElementById('btnMenuToggle')?.addEventListener('click', toggleSidebar);
document.getElementById('sidebarOverlay')?.addEventListener('click', cerrarSidebar);

// ============================================================
// CAMBIAR SECCIÓN
// ============================================================
function cambiarSeccion(seccion) {
    seccionActual = seccion;
    document.querySelectorAll('.sidebar-menu a').forEach(el => el.classList.remove('active'));
    document.querySelector(`.sidebar-menu a[data-section="${seccion}"]`)?.classList.add('active');
    const container = document.getElementById('seccionesContainer');
    switch (seccion) {
        case 'config': cargarConfiguracion(container); break;
        case 'servicios': cargarServicios(container); break;
        case 'turnos': cargarTurnos(container); break;
        case 'usuarios': cargarUsuarios(container); break;
        case 'testimonios': cargarTestimoniosAdmin(container); break;
        case 'seguridad': cargarSeguridad(container); break;
        default: container.innerHTML = '<div class="config-panel"><p>Cargando...</p></div>';
    }
}

// ============================================================
// CONFIGURACIÓN - HORARIOS (CORREGIDO)
// ============================================================
function cargarConfiguracion(container) {
    container.innerHTML = `
        <div id="tabConfig">
            <div class="config-panel">
                <h3><i class="fas fa-calendar-alt"></i> Horarios y Días de Atención</h3>
                <div class="form-group">
                    <label>Días de atención</label>
                    <div id="diasContainer" style="display:flex;flex-wrap:wrap;gap:0.5rem;">
                        <label class="dia-checkbox"><input type="checkbox" value="lunes"> Lunes</label>
                        <label class="dia-checkbox"><input type="checkbox" value="martes"> Martes</label>
                        <label class="dia-checkbox"><input type="checkbox" value="miercoles"> Miércoles</label>
                        <label class="dia-checkbox"><input type="checkbox" value="jueves"> Jueves</label>
                        <label class="dia-checkbox"><input type="checkbox" value="viernes"> Viernes</label>
                        <label class="dia-checkbox"><input type="checkbox" value="sabado"> Sábado</label>
                        <label class="dia-checkbox"><input type="checkbox" value="domingo"> Domingo</label>
                    </div>
                    <div style="margin-top:0.5rem;font-size:0.7rem;color:#6b7280;">
                        <i class="fas fa-info-circle"></i> Marca los días en los que el negocio está abierto
                    </div>
                </div>
                <div class="form-group">
                    <label>Horarios disponibles</label>
                    <div id="horariosList" style="margin-bottom:.5rem;display:flex;flex-wrap:wrap;gap:0.3rem;"></div>
                    <div class="input-group">
                        <input type="time" id="nuevoHorario" step="3600">
                        <button class="btn btn-primary" id="btnAgregarHorario"><i class="fas fa-plus"></i> Agregar Horario</button>
                    </div>
                </div>
                <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                    <button class="btn btn-success" id="btnGuardarHorarios"><i class="fas fa-save"></i> Guardar Horarios</button>
                    <button class="btn btn-outline" id="btnRecargarHorarios"><i class="fas fa-sync"></i> Recargar</button>
                </div>
                <div id="horariosStatus" style="margin-top:0.5rem;font-size:0.8rem;color:#6b7280;"></div>
            </div>
            <div class="config-panel">
                <h3><i class="fas fa-clock"></i> Rango Horario Laboral</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hora de inicio (apertura)</label>
                        <input type="time" id="horaInicio" value="08:00">
                    </div>
                    <div class="form-group">
                        <label>Hora de fin (cierre)</label>
                        <input type="time" id="horaFin" value="20:00">
                    </div>
                </div>
                <button class="btn btn-primary" id="btnGuardarRango"><i class="fas fa-save"></i> Generar y Guardar Horarios</button>
            </div>
        </div>
    `;

    // Cargar horarios
    cargarHorariosUI();

    // Eventos
    document.getElementById('btnGuardarHorarios').onclick = guardarHorarios;
    document.getElementById('btnRecargarHorarios').onclick = cargarHorariosUI;
    document.getElementById('btnAgregarHorario').onclick = agregarHorario;
    document.getElementById('btnGuardarRango').onclick = guardarRangoHorario;
    document.getElementById('btnGuardarConfig').onclick = () => showToast('Configuración guardada', 'success');
}

// ============================================================
// CARGAR HORARIOS
// ============================================================
async function cargarHorariosUI() {
    try {
        showToast('⏳ Cargando horarios...', 'info');
        const response = await fetch(HORARIOS_API);
        if (!response.ok) throw new Error(`Error ${response.status}`);
        const data = await response.json();
        console.log('📋 Horarios cargados:', data);
        
        horariosConfig = {
            dias: Array.isArray(data.dias) ? data.dias : ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'],
            horarios: Array.isArray(data.horarios) ? data.horarios : ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'],
            inicio: typeof data.inicio === 'number' ? data.inicio : 8,
            fin: typeof data.fin === 'number' ? data.fin : 20
        };
        
        renderHorariosUI();
        
        const inicioInput = document.getElementById('horaInicio');
        const finInput = document.getElementById('horaFin');
        if (inicioInput) inicioInput.value = String(horariosConfig.inicio).padStart(2, '0') + ':00';
        if (finInput) finInput.value = String(horariosConfig.fin).padStart(2, '0') + ':00';
        
        document.getElementById('horariosStatus').textContent = `✅ Horarios cargados: ${horariosConfig.dias.length} días, ${horariosConfig.horarios.length} horarios`;
        showToast('✅ Horarios cargados', 'success');
    } catch(e) {
        console.error('❌ Error cargando horarios:', e);
        showToast('⚠️ Error al cargar horarios', 'error');
    }
}

// ============================================================
// RENDERIZAR UI DE HORARIOS
// ============================================================
function renderHorariosUI() {
    console.log('🔄 Renderizando UI...');
    
    // 1. DÍAS
    const diasContainer = document.getElementById('diasContainer');
    if (diasContainer) {
        const diasGuardados = horariosConfig.dias || [];
        const checkboxes = diasContainer.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            const checked = diasGuardados.includes(cb.value);
            cb.checked = checked;
            const label = cb.closest('label');
            if (label) {
                if (checked) label.classList.add('checked');
                else label.classList.remove('checked');
            }
        });
        // Eventos
        if (!diasContainer._listenersAdded) {
            checkboxes.forEach(cb => {
                cb.addEventListener('change', function() {
                    const label = this.closest('label');
                    if (label) {
                        if (this.checked) label.classList.add('checked');
                        else label.classList.remove('checked');
                    }
                });
            });
            diasContainer._listenersAdded = true;
        }
    }
    
    // 2. HORARIOS
    const horariosList = document.getElementById('horariosList');
    if (horariosList) {
        const horarios = horariosConfig.horarios || [];
        if (horarios.length === 0) {
            horariosList.innerHTML = '<span style="color:#9ca3af;font-size:0.75rem;">No hay horarios configurados</span>';
        } else {
            horariosList.innerHTML = horarios.map(h =>
                `<span class="horario-item">${h} <button onclick="eliminarHorario('${h}')"><i class="fas fa-times-circle"></i></button></span>`
            ).join('');
        }
    }
}

// ============================================================
// ELIMINAR HORARIO
// ============================================================
window.eliminarHorario = function(horario) {
    horariosConfig.horarios = horariosConfig.horarios.filter(h => h !== horario);
    renderHorariosUI();
    showToast(`Horario ${horario} eliminado`, 'warning');
};

// ============================================================
// AGREGAR HORARIO
// ============================================================
function agregarHorario() {
    const input = document.getElementById('nuevoHorario');
    const valor = input.value;
    if (!valor) { showToast('⚠️ Seleccione un horario', 'warning'); return; }
    if (horariosConfig.horarios.includes(valor)) { showToast('⚠️ El horario ya existe', 'warning'); return; }
    horariosConfig.horarios.push(valor);
    horariosConfig.horarios.sort();
    renderHorariosUI();
    input.value = '';
    showToast(`✅ Horario ${valor} agregado`, 'success');
}

// ============================================================
// GUARDAR HORARIOS - CORREGIDO
// ============================================================
async function guardarHorarios() {
    try {
        showToast('⏳ Guardando horarios...', 'info');
        
        // 1. Obtener días seleccionados
        const dias = [];
        document.querySelectorAll('#diasContainer input[type="checkbox"]:checked').forEach(cb => {
            dias.push(cb.value);
        });
        
        console.log('📋 Días seleccionados:', dias);
        
        if (dias.length === 0) {
            showToast('⚠️ Selecciona al menos un día', 'warning');
            return;
        }
        
        // 2. Obtener horarios
        const horarios = horariosConfig.horarios || [];
        console.log('📋 Horarios:', horarios);
        
        if (horarios.length === 0) {
            showToast('⚠️ Agrega al menos un horario', 'warning');
            return;
        }
        
        // 3. Obtener rango
        const inicioInput = document.getElementById('horaInicio');
        const finInput = document.getElementById('horaFin');
        let inicio = 8, fin = 20;
        if (inicioInput && inicioInput.value) {
            const partes = inicioInput.value.split(':');
            inicio = parseInt(partes[0]) || 8;
        }
        if (finInput && finInput.value) {
            const partes = finInput.value.split(':');
            fin = parseInt(partes[0]) || 20;
        }
        
        if (inicio >= fin) {
            showToast('⚠️ Inicio debe ser menor que cierre', 'error');
            return;
        }
        
        // 4. Preparar datos
        const data = { dias, horarios, inicio, fin };
        console.log('📤 Enviando:', JSON.stringify(data, null, 2));
        
        // 5. Enviar al servidor
        const response = await apiFetch(HORARIOS_API, {
            method: 'PUT',
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        console.log('📥 Respuesta:', result);
        
        if (response.ok) {
            horariosConfig = data;
            renderHorariosUI();
            document.getElementById('horariosStatus').textContent = `✅ Horarios guardados: ${dias.length} días, ${horarios.length} horarios`;
            showToast('✅ Horarios guardados correctamente', 'success');
        } else {
            showToast('❌ Error: ' + (result.error || 'Error desconocido'), 'error');
        }
    } catch(e) {
        console.error('❌ Error:', e);
        showToast('❌ Error al guardar: ' + e.message, 'error');
    }
}

// ============================================================
// GUARDAR RANGO HORARIO
// ============================================================
async function guardarRangoHorario() {
    try {
        const inicioStr = document.getElementById('horaInicio').value;
        const finStr = document.getElementById('horaFin').value;
        
        if (!inicioStr || !finStr) {
            showToast('⚠️ Selecciona ambas horas', 'error');
            return;
        }
        
        const inicio = parseInt(inicioStr.split(':')[0]);
        const fin = parseInt(finStr.split(':')[0]);
        
        if (isNaN(inicio) || isNaN(fin) || inicio >= fin) {
            showToast('⚠️ Rango inválido', 'error');
            return;
        }
        
        // Generar horarios
        const horarios = [];
        for (let h = inicio; h < fin; h++) {
            horarios.push(`${String(h).padStart(2, '0')}:00`);
        }
        
        // Obtener días
        const dias = [];
        document.querySelectorAll('#diasContainer input[type="checkbox"]:checked').forEach(cb => {
            dias.push(cb.value);
        });
        
        if (dias.length === 0) {
            showToast('⚠️ Selecciona al menos un día', 'warning');
            return;
        }
        
        const data = { dias, horarios, inicio, fin };
        console.log('📤 Generando horarios:', data);
        
        const response = await apiFetch(HORARIOS_API, {
            method: 'PUT',
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            horariosConfig = data;
            renderHorariosUI();
            document.getElementById('horariosStatus').textContent = `✅ Rango guardado: ${dias.length} días, ${horarios.length} horarios`;
            showToast('✅ Rango horario guardado', 'success');
        } else {
            showToast('❌ Error: ' + (result.error || 'Error desconocido'), 'error');
        }
    } catch(e) {
        console.error('❌ Error:', e);
        showToast('❌ Error al guardar: ' + e.message, 'error');
    }
}
